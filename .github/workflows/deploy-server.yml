# Deploy automático do servidor no Fly.io a cada push que toca o backend.
# Requer o secret FLY_API_TOKEN (Fly dashboard → Tokens → Deploy token).
name: Deploy server

on:
  push:
    branches: [master]
    paths:
      - 'server/**'
      - 'shared/**'
      - 'fly.toml'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency: fly-deploy
    steps:
      - uses: actions/checkout@v7
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
