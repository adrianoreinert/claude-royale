name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Instalar dependências
        run: pnpm install --frozen-lockfile=false

      - name: Testes da simulação e do motor de cartas
        run: pnpm --filter @claude-royale/shared test

      - name: Typecheck do cliente
        run: pnpm --filter @claude-royale/client exec tsc --noEmit

      - name: Build do cliente
        run: pnpm --filter @claude-royale/client build

      - name: Smoke test — 20 partidas bot vs bot
        run: pnpm --filter @claude-royale/server balance 20
