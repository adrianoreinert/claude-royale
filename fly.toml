# Servidor Claude Royale no Fly.io (o cliente vai em CDN estática, ex. Cloudflare Pages)
# Deploy: fly deploy   |   Logs: fly logs
app = 'claude-royale'
primary_region = 'mia'

[build]
  dockerfile = 'server/Dockerfile'

[http_service]
  internal_port = 2567
  force_https = true
  # Servidor de partidas nao pode dormir: WebSockets ativos morrem com a maquina.
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

# Persistencia do ranking/telemetria (server/data)
[mounts]
  source = 'claude_royale_data'
  destination = '/app/server/data'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
